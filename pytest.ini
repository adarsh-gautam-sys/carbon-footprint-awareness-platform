[pytest]
# Automatically use asyncio as the event loop for async tests.
# 'auto' mode means all async test functions are treated as asyncio coroutines
# without needing @pytest.mark.asyncio decorators.
asyncio_mode = auto

# Display extra test summary info for failures, errors, and warnings
addopts = -v --tb=short -q

# Test discovery paths
testpaths = tests
